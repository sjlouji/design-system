name: Release

# Runs when a commit lands on main (direct push or merged PR).
# Skips if the commit message contains [skip ci] or was made by the bot itself.

on:
  push:
    branches: [main]

jobs:
  release:
    name: Version · Tag · Publish
    runs-on: ubuntu-latest
    # Don't run on the version-bump commit the bot itself pushes
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    permissions:
      contents: write   # push tag + release
      id-token: write   # npm provenance

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                      # full history for commit analysis
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build library
        run: npm run build

      # ── Versioning ────────────────────────────────────────────────────────────

      - name: Bump version (conventional commits)
        id: version
        run: |
          NEW_VERSION=$(node scripts/bump-version.mjs)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump & push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Commit only if package.json was actually modified (not already bumped)
          git add package.json
          if git diff --staged --quiet; then
            echo "package.json already at v${{ steps.version.outputs.version }}, skipping commit"
          else
            git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"
            git push
          fi

          # Tag only if it doesn't exist yet
          if git rev-parse "refs/tags/v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping"
          else
            git tag "v${{ steps.version.outputs.version }}"
            git push --tags
          fi

      # ── GitHub Release ────────────────────────────────────────────────────────

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Release v${{ steps.version.outputs.version }} already exists, skipping"
          else
            gh release create "v${{ steps.version.outputs.version }}" \
              --title "v${{ steps.version.outputs.version }}" \
              --generate-notes
          fi

      # ── npm Publish ───────────────────────────────────────────────────────────

      - name: Publish to npm (latest)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PUBLISHED=$(npm view @sjlouji/design-system version 2>/dev/null || echo "none")
          if [ "$PUBLISHED" = "${{ steps.version.outputs.version }}" ]; then
            echo "v${{ steps.version.outputs.version }} already published, skipping"
          else
            npm publish --access public --provenance --tag latest
          fi
